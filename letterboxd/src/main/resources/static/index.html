<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="letterboxdAR — Your personal film journal. Track films you've watched, save the ones you want to see.">
    <title>letterboxdAR — Film Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Work+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav id="main-nav" aria-label="Main navigation">
        <div class="nav-inner">
            <a href="#/" class="nav-logo">letterboxdAR</a>
            <div class="nav-links" id="nav-links">
                <a href="#/" class="nav-link" data-page="home">Home</a>
                <a href="#/films" class="nav-link" data-page="films">Films</a>
                <a href="#/profile" class="nav-link" data-page="profile" id="nav-profile-link" style="display:none;">Profile</a>
                <a href="#/signup" class="nav-link" data-page="signup" id="nav-signup-link">Sign up</a>
            </div>
            <button class="nav-menu-toggle" id="nav-menu-toggle" aria-label="Toggle menu">Menu</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="app" role="main"></main>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true">
            <button class="modal-close" id="modal-close" aria-label="Close modal">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast" aria-live="polite"></div>

    <!-- Footer -->
    <footer id="main-footer">
        <span>letterboxdAR · a film diary</span>
    </footer>

    <script src="app.js"></script>
</body>
</html>
